<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="1920" viewBox="0 0 1080 1920">
  <rect width="1080" height="1920" fill="#f4f7fa"/>
  <rect x="24" y="24" width="1032" height="1872" rx="10" fill="none" stroke="#cbd5e1" stroke-width="2"/>
  <text x="54" y="76" font-size="34" font-family="Microsoft YaHei, Arial, sans-serif" font-weight="700" fill="#0f172a">SurvivalRankingPanel 施工原型</text>
  <text x="54" y="112" font-size="20" font-family="Microsoft YaHei, Arial, sans-serif" fill="#475569">1080x1920 竖屏；灰盒、坐标、节点名均为施工标注，最终效果图不要出现这些文字。</text>
  <rect x="54" y="150" width="972" height="1" fill="#cbd5e1"/>
<g id="block_0__overlay">
  <rect x="0" y="0" width="1080" height="1920" rx="8" fill="#1f2937" fill-opacity="0.2" stroke="#334155" stroke-width="3"/>
  <text x="18" y="42" font-size="30" font-family="Microsoft YaHei, Arial, sans-serif" font-weight="700" fill="#e5e7eb">暗化背景</text>
  <text x="18" y="76" font-size="19" font-family="Microsoft YaHei, Arial, sans-serif" fill="#e5e7eb" opacity="0.85">_overlay</text>
  <text x="18" y="1902" font-size="20" fill="#e5e7eb" opacity="0.75">排行榜遮罩</text>
</g>
<g id="block_1__panel">
  <rect x="70" y="170" width="940" height="1510" rx="8" fill="#e8f0f5" fill-opacity="0.98" stroke="#416075" stroke-width="3"/>
  <text x="88" y="212" font-size="30" font-family="Microsoft YaHei, Arial, sans-serif" font-weight="700" fill="#143042">排行榜面板</text>
  <text x="88" y="246" font-size="19" font-family="Microsoft YaHei, Arial, sans-serif" fill="#143042" opacity="0.85">_panel</text>
  <text x="88" y="1662" font-size="20" fill="#143042" opacity="0.75">双页签榜单</text>
</g>
<g id="block_2__titleText/_subtitleText/_closeBtn">
  <rect x="110" y="215" width="860" height="110" rx="8" fill="#d9edf7" fill-opacity="1" stroke="#2f6f88" stroke-width="3"/>
  <text x="128" y="257" font-size="30" font-family="Microsoft YaHei, Arial, sans-serif" font-weight="700" fill="#073042">标题/关闭</text>
  <text x="128" y="291" font-size="19" font-family="Microsoft YaHei, Arial, sans-serif" fill="#073042" opacity="0.85">_titleText/_subtitleText/_closeBtn</text>
  <text x="128" y="307" font-size="20" fill="#073042" opacity="0.75">生存排行榜 / 关闭</text>
</g>
<g id="block_3__tabContribution/_tabStreamer">
  <rect x="120" y="355" width="840" height="82" rx="8" fill="#fff2bd" fill-opacity="1" stroke="#b88912" stroke-width="3"/>
  <text x="138" y="396" font-size="30" font-family="Microsoft YaHei, Arial, sans-serif" font-weight="700" fill="#6b4e00">页签栏</text>
  <text x="138" y="428" font-size="19" font-family="Microsoft YaHei, Arial, sans-serif" fill="#6b4e00" opacity="0.85">_tabContribution/_tabStreamer</text>
  <text x="138" y="419" font-size="20" fill="#6b4e00" opacity="0.75">贡献榜 / 主播榜</text>
</g>
<g id="block_4__headerRow">
  <rect x="120" y="465" width="840" height="62" rx="8" fill="#f2f5f7" fill-opacity="1" stroke="#7b8a97" stroke-width="3"/>
  <text x="138" y="497" font-size="24" font-family="Microsoft YaHei, Arial, sans-serif" font-weight="700" fill="#243444">表头</text>
  <text x="138" y="528" font-size="19" font-family="Microsoft YaHei, Arial, sans-serif" fill="#243444" opacity="0.85">_headerRow</text>
  <text x="138" y="509" font-size="20" fill="#243444" opacity="0.75">名次 / 玩家或主播 / 数据</text>
</g>
<g id="block_5__rowContainer">
  <rect x="120" y="545" width="840" height="880" rx="8" fill="#f7fbff" fill-opacity="1" stroke="#7aa6c2" stroke-width="3" stroke-dasharray="12 10"/>
  <text x="138" y="587" font-size="30" font-family="Microsoft YaHei, Arial, sans-serif" font-weight="700" fill="#2f5065">滚动列表</text>
  <text x="138" y="621" font-size="19" font-family="Microsoft YaHei, Arial, sans-serif" fill="#2f5065" opacity="0.85">_rowContainer</text>
  <text x="138" y="1407" font-size="20" fill="#2f5065" opacity="0.75">统一行高排行</text>
</g>
<g id="block_6__emptyHint">
  <rect x="210" y="1450" width="660" height="74" rx="8" fill="#f8fafc" fill-opacity="1" stroke="#94a3b8" stroke-width="3" stroke-dasharray="8 8"/>
  <text x="228" y="1487" font-size="24" font-family="Microsoft YaHei, Arial, sans-serif" font-weight="700" fill="#475569">空榜提示</text>
  <text x="228" y="1519" font-size="19" font-family="Microsoft YaHei, Arial, sans-serif" fill="#475569" opacity="0.85">_emptyHint</text>
  <text x="228" y="1506" font-size="20" fill="#475569" opacity="0.75">暂无数据时显示</text>
</g>
  <rect x="54" y="1660" width="972" height="190" rx="8" fill="#ffffff" stroke="#cbd5e1" stroke-width="2"/>
  <text x="80" y="1700" font-size="24" font-family="Microsoft YaHei, Arial, sans-serif" font-weight="700" fill="#0f172a">Prefab 核对</text>
  <text x="80" y="1734" font-size="20" font-family="Microsoft YaHei, Arial, sans-serif" fill="#334155">脚本：外部控制脚本，见策划案</text>
  <text x="80" y="1766" font-size="20" font-family="Microsoft YaHei, Arial, sans-serif" fill="#334155">节点摘录：PlayerName / RankNum / Score / RankRow_46 / RankRow_23 / RankRow_19 / RankRow_13 / RankRow_49</text>
