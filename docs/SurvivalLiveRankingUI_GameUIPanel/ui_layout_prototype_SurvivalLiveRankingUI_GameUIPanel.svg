<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="1920" viewBox="0 0 1080 1920">
  <defs>
    <style>
      .bg { fill: #f2f3f5; }
      .root { fill: #ffffff; stroke: #222222; stroke-width: 2; }
      .panel { fill: #f8fafc; stroke: #222222; stroke-width: 2; }
      .panel-soft { fill: #eef4fb; stroke: #222222; stroke-width: 2; }
      .panel-hot { fill: #fff1c2; stroke: #222222; stroke-width: 2; }
      .panel-warn { fill: #ffe2df; stroke: #222222; stroke-width: 2; }
      .slot { fill: #ffffff; stroke: #777777; stroke-width: 2; stroke-dasharray: 8 8; }
      .scene { fill: #eef0f2; stroke: #999999; stroke-width: 2; stroke-dasharray: 10 8; }
      .button { fill: #fff8db; stroke: #222222; stroke-width: 2; }
      .chip { fill: #ffffff; stroke: #333333; stroke-width: 1.5; }
      .inactive { fill: #f7f7f7; stroke: #999999; stroke-width: 2; stroke-dasharray: 6 6; }
      .title { font-family: "Microsoft YaHei", "Alibaba PuHuiTi", sans-serif; font-size: 30px; font-weight: 800; fill: #111111; }
      .h1 { font-family: "Microsoft YaHei", "Alibaba PuHuiTi", sans-serif; font-size: 38px; font-weight: 800; fill: #111111; }
      .h2 { font-family: "Microsoft YaHei", "Alibaba PuHuiTi", sans-serif; font-size: 26px; font-weight: 800; fill: #111111; }
      .label { font-family: "Microsoft YaHei", "Alibaba PuHuiTi", sans-serif; font-size: 21px; font-weight: 700; fill: #111111; }
      .small { font-family: "Microsoft YaHei", "Alibaba PuHuiTi", sans-serif; font-size: 17px; fill: #333333; }
      .tiny { font-family: "Microsoft YaHei", "Alibaba PuHuiTi", sans-serif; font-size: 14px; fill: #555555; }
      .rank { font-family: "Microsoft YaHei", "Alibaba PuHuiTi", sans-serif; font-size: 26px; font-weight: 800; fill: #111111; }
      .number { font-family: "Microsoft YaHei", "Alibaba PuHuiTi", sans-serif; font-size: 28px; font-weight: 900; fill: #111111; }
      .gold { fill: #7a4a00; }
      .blue { fill: #0f4f7a; }
      .red { fill: #9b1c1c; }
      .green { fill: #14532d; }
    </style>
  </defs>

