<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="1920" viewBox="0 0 1080 1920">
  <rect width="1080" height="1920" fill="#f4f7fa"/>
  <rect x="24" y="24" width="1032" height="1872" rx="10" fill="none" stroke="#cbd5e1" stroke-width="2"/>
  <text x="54" y="76" font-size="34" font-family="Microsoft YaHei, Arial, sans-serif" font-weight="700" fill="#0f172a">ShopUI_ShopPanel 施工原型</text>
  <text x="54" y="112" font-size="20" font-family="Microsoft YaHei, Arial, sans-serif" fill="#475569">1080x1920 竖屏；灰盒、坐标、节点名均为施工标注，最终效果图不要出现这些文字。</text>
  <rect x="54" y="150" width="972" height="1" fill="#cbd5e1"/>
<g id="block_0_ShopBackdrop">
  <rect x="0" y="0" width="1080" height="1920" rx="8" fill="#1f2937" fill-opacity="0.2" stroke="#334155" stroke-width="3"/>
  <text x="18" y="42" font-size="30" font-family="Microsoft YaHei, Arial, sans-serif" font-weight="700" fill="#e5e7eb">暗化背景</text>
  <text x="18" y="76" font-size="19" font-family="Microsoft YaHei, Arial, sans-serif" fill="#e5e7eb" opacity="0.85">ShopBackdrop</text>
  <text x="18" y="1902" font-size="20" fill="#e5e7eb" opacity="0.75">覆盖游戏</text>
</g>
<g id="block_1_ShopPanel">
  <rect x="60" y="150" width="960" height="1520" rx="8" fill="#e8f0f5" fill-opacity="0.98" stroke="#416075" stroke-width="3"/>
  <text x="78" y="192" font-size="30" font-family="Microsoft YaHei, Arial, sans-serif" font-weight="700" fill="#143042">商店面板</text>
  <text x="78" y="226" font-size="19" font-family="Microsoft YaHei, Arial, sans-serif" fill="#143042" opacity="0.85">ShopPanel</text>
  <text x="78" y="1652" font-size="20" fill="#143042" opacity="0.75">商店</text>
</g>
<g id="block_2_Header/TitleText/BtnClose">
  <rect x="90" y="190" width="900" height="90" rx="8" fill="#d9edf7" fill-opacity="1" stroke="#2f6f88" stroke-width="3"/>
  <text x="108" y="232" font-size="30" font-family="Microsoft YaHei, Arial, sans-serif" font-weight="700" fill="#073042">标题栏</text>
  <text x="108" y="266" font-size="19" font-family="Microsoft YaHei, Arial, sans-serif" fill="#073042" opacity="0.85">Header/TitleText/BtnClose</text>
  <text x="108" y="262" font-size="20" fill="#073042" opacity="0.75">商店 / 关闭</text>
</g>
<g id="block_3_TabRow">
  <rect x="100" y="305" width="880" height="76" rx="8" fill="#f2f5f7" fill-opacity="1" stroke="#7b8a97" stroke-width="3"/>
  <text x="118" y="343" font-size="24" font-family="Microsoft YaHei, Arial, sans-serif" font-weight="700" fill="#243444">标签栏</text>
  <text x="118" y="375" font-size="19" font-family="Microsoft YaHei, Arial, sans-serif" fill="#243444" opacity="0.85">TabRow</text>
  <text x="118" y="363" font-size="20" fill="#243444" opacity="0.75">商店A / 商店B / 背包</text>
</g>
<g id="block_4_BalanceBar/BalanceText">
  <rect x="100" y="405" width="880" height="72" rx="8" fill="#fff2bd" fill-opacity="1" stroke="#b88912" stroke-width="3"/>
  <text x="118" y="441" font-size="24" font-family="Microsoft YaHei, Arial, sans-serif" font-weight="700" fill="#6b4e00">余额条</text>
  <text x="118" y="473" font-size="19" font-family="Microsoft YaHei, Arial, sans-serif" fill="#6b4e00" opacity="0.85">BalanceBar/BalanceText</text>
  <text x="118" y="459" font-size="20" fill="#6b4e00" opacity="0.75">贡献/可消费/终身</text>
</g>
<g id="block_5_Viewport/Content">
  <rect x="100" y="505" width="880" height="1040" rx="8" fill="#f7fbff" fill-opacity="1" stroke="#7aa6c2" stroke-width="3" stroke-dasharray="12 10"/>
  <text x="118" y="547" font-size="30" font-family="Microsoft YaHei, Arial, sans-serif" font-weight="700" fill="#2f5065">商品列表</text>
  <text x="118" y="581" font-size="19" font-family="Microsoft YaHei, Arial, sans-serif" fill="#2f5065" opacity="0.85">Viewport/Content</text>
  <text x="118" y="1527" font-size="20" fill="#2f5065" opacity="0.75">商品按钮列表</text>
</g>
<g id="block_6_StatusText">
  <rect x="120" y="1570" width="840" height="54" rx="8" fill="#f8fafc" fill-opacity="1" stroke="#94a3b8" stroke-width="3" stroke-dasharray="8 8"/>
  <text x="138" y="1602" font-size="24" font-family="Microsoft YaHei, Arial, sans-serif" font-weight="700" fill="#475569">状态提示</text>
  <text x="138" y="1629" font-size="19" font-family="Microsoft YaHei, Arial, sans-serif" fill="#475569" opacity="0.85">StatusText</text>
  <text x="138" y="1606" font-size="20" fill="#475569" opacity="0.75">购买失败/状态</text>
</g>
  <rect x="54" y="1660" width="972" height="190" rx="8" fill="#ffffff" stroke="#cbd5e1" stroke-width="2"/>
  <text x="80" y="1700" font-size="24" font-family="Microsoft YaHei, Arial, sans-serif" font-weight="700" fill="#0f172a">Prefab 核对</text>
  <text x="80" y="1734" font-size="20" font-family="Microsoft YaHei, Arial, sans-serif" fill="#334155">脚本：ShopUI</text>
  <text x="80" y="1766" font-size="20" font-family="Microsoft YaHei, Arial, sans-serif" fill="#334155">节点摘录：Label / BtnClose / StatusBar / Header / TabB / TabInventory / TabA / TabRow</text>
<text x="80" y="1726" font-size="22" font-family="Microsoft YaHei, Arial, sans-serif" fill="#334155">示例文案：×</text>
<text x="80" y="1760" font-size="22" font-family="Microsoft YaHei, Arial, sans-serif" fill="#334155">示例文案：我的背包</text>
<text x="80" y="1794" font-size="22" font-family="Microsoft YaHei, Arial, sans-serif" fill="#334155">示例文案：贡献 0  可消费 0  终身 0</text>
<text x="80" y="1828" font-size="22" font-family="Microsoft YaHei, Arial, sans-serif" fill="#334155">示例文案：商店</text>
</svg>