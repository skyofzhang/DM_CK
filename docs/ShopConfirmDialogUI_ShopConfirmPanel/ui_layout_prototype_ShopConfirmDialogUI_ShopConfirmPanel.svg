  <text x="188" y="656" font-size="19" font-family="Microsoft YaHei, Arial, sans-serif" fill="#143042" opacity="0.85">ShopConfirmPanel</text>
  <text x="188" y="1082" font-size="20" fill="#143042" opacity="0.75">确认购买</text>
</g>
