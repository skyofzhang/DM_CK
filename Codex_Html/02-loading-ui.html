<!DOCTYPE html><html lang="zh-CN"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>极地生存法则·加载界面</title><style>*{box-sizing:border-box}html,body{margin:0;min-height:100%;background:#000;overflow:hidden;font-family:'PingFang SC','Microsoft YaHei',sans-serif}body{display:flex;justify-content:center;padding:18px 0}.screen{position:relative;width:1080px;height:1920px;overflow:hidden;background:radial-gradient(ellipse at 50% 40%,#0D2A44 0%,#061020 70%,#020810 100%)}.snow{position:absolute;inset:0}.f{position:absolute;border-radius:50%;background:#fff;box-shadow:0 0 8px rgba(255,255,255,.25)}.center{position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);width:900px;height:900px;display:flex;flex-direction:column;align-items:center}.title{margin-top:170px;font-size:96px;font-weight:900;color:transparent;background:linear-gradient(180deg,#fff 0%,#7EC8E3 60%,#4A9ECC 100%);-webkit-background-clip:text;background-clip:text;filter:drop-shadow(0 0 30px rgba(74,158,204,.7))}.sub{margin-top:20px;font-size:34px;color:#7EC8E3;letter-spacing:8px}.line{width:480px;height:1px;margin-top:30px;background:linear-gradient(90deg,transparent,#4A9ECC,transparent)}.tip{margin-top:60px;font-size:36px;color:#93C5FD}.bar{position:relative;width:700px;margin-top:80px}.track{height:22px;border-radius:11px;background:rgba(10,20,35,.8);border:1.5px solid rgba(74,158,204,.4);overflow:hidden}.fill{position:relative;width:72%;height:100%;border-radius:11px;background:linear-gradient(90deg,#1a4a7a,#4A9ECC,#7EC8E3);box-shadow:0 0 16px rgba(74,158,204,.6);overflow:hidden}.sweep{position:absolute;top:-14px;left:-220px;width:200px;height:50px;background:linear-gradient(115deg,transparent,rgba(255,255,255,.06),transparent);transform:skewX(-20deg);animation:sweep 5s linear infinite}.pct{position:absolute;right:-78px;top:-8px;font-size:30px;color:#7EC8E3}.copy{position:absolute;bottom:80px;left:50%;transform:translateX(-50%);font-size:22px;color:#4A9ECC;opacity:.35}@keyframes sweep{to{left:560px}}</style></head><body><div class="screen"><div class="snow" id="snow"></div><div class="center"><div class="title">极地生存法则</div><div class="sub">WINTER SURVIVAL</div><div class="line"></div><div class="tip">凛冬将至，做好准备<span id="dots">...</span></div><div class="bar"><div class="track"><div class="fill"><div class="sweep"></div></div></div><div class="pct">72%</div></div></div><div class="copy">© 极地生存法则 · 抖音直播互动</div></div><script>const snow=document.getElementById('snow'),dots=document.getElementById('dots'),states=['...','.. ',' . '];let di=0;setInterval(()=>{di=(di+1)%states.length;dots.textContent=states[di]},500);const flakes=Array.from({length:50},()=>{const e=document.createElement('span'),s=1+Math.random()*3,o={e,x:Math.random()*1080,y:Math.random()*1920,sp:1+Math.random()*2.4,s,ph:Math.random()*Math.PI*2};e.className='f';e.style.width=s+'px';e.style.height=s+'px';snow.appendChild(e);return o});function tick(t){flakes.forEach(f=>{f.y+=f.sp+(f.y/1920)*.045;if(f.y>1940){f.y=-10;f.x=Math.random()*1080}const sway=Math.sin(t/500+f.ph)*10;f.e.style.transform='translate('+(f.x+sway)+'px,'+f.y+'px)';f.e.style.opacity=.3+Math.min(.7,f.s/5)});requestAnimationFrame(tick)}requestAnimationFrame(tick);</script></body></html>
