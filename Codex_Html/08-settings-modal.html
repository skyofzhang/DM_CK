<!DOCTYPE html><html lang="zh-CN"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>极地生存法则·设置面板</title><style>*{box-sizing:border-box}html,body{margin:0;min-height:100%;background:#000;overflow:hidden;font-family:'PingFang SC','Microsoft YaHei',sans-serif}body{display:flex;justify-content:center;padding:18px 0}.screen{position:relative;width:1080px;height:1920px;overflow:hidden}.bg{position:absolute;inset:0;background:linear-gradient(180deg,#0D2A20 0%,#0A1F30 40%,#061525 100%);background-image:linear-gradient(rgba(74,158,204,.04) 1px,transparent 1px),linear-gradient(90deg,rgba(74,158,204,.04) 1px,transparent 1px);background-size:80px 80px;filter:blur(4px)}.mask{position:absolute;inset:0;background:rgba(2,8,20,.75)}.modal{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:860px;height:620px;background:linear-gradient(160deg,rgba(13,31,51,.97),rgba(6,16,32,.97));border:2px solid #4A9ECC;border-radius:28px;box-shadow:0 0 60px rgba(74,158,204,.25),inset 0 0 30px rgba(74,158,204,.05);color:#fff}.head{height:90px;display:flex;align-items:center;justify-content:space-between;padding:0 40px;border-bottom:1px solid rgba(74,158,204,.3)}.head h2{margin:0;font-size:46px}.close{width:48px;height:48px;border-radius:50%;background:rgba(74,158,204,.15);border:1.5px solid #4A9ECC;color:#7EC8E3;font-size:30px;display:flex;align-items:center;justify-content:center;transition:.2s}.close:hover{background:rgba(74,158,204,.28);transform:scale(1.1)}.content{padding:50px 60px;display:flex;flex-direction:column;gap:50px}.row{display:flex;align-items:center;gap:24px}.ico{width:56px;height:56px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:28px;color:#4A9ECC;background:rgba(74,158,204,.15);border:1.5px solid #4A9ECC}.texts{width:210px}.t{font-size:36px}.d{font-size:24px;color:#93C5FD;margin-top:6px}.sw{display:flex;align-items:center;gap:16px;flex:1;max-width:420px}input[type=range]{width:100%;height:16px;background:transparent;-webkit-appearance:none;appearance:none}input[type=range]::-webkit-slider-runnable-track{height:8px;border-radius:4px;background:var(--track)}input[type=range]::-moz-range-track{height:8px;border-radius:4px;background:var(--track)}input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;appearance:none;margin-top:-10px;width:28px;height:28px;border-radius:50%;background:#4A9ECC;box-shadow:0 0 18px rgba(74,158,204,.5)}input[type=range]::-moz-range-thumb{width:28px;height:28px;border:none;border-radius:50%;background:#4A9ECC;box-shadow:0 0 18px rgba(74,158,204,.5)}.pv{font-size:28px;color:#4A9ECC;width:66px}.done{position:absolute;left:50%;bottom:40px;transform:translateX(-50%);width:400px;height:90px;border:2px solid #4A9ECC;border-radius:20px;background:linear-gradient(135deg,#1a4a7a,#2563a8);color:#fff;font-size:40px;font-weight:900}</style></head><body><div class="screen"><div class="bg"></div><div class="mask"></div><div class="modal"><div class="head"><h2>⚙ 游戏设置</h2><div class="close">×</div></div><div class="content"><div class="row"><div class="ico">🎵</div><div class="texts"><div class="t">背景音乐</div><div class="d">调节背景音乐音量</div></div><div class="sw"><input id="bgm" type="range" min="0" max="100" value="70"><div class="pv" id="bgmV">70%</div></div></div><div class="row"><div class="ico">🔊</div><div class="texts"><div class="t">音效音量</div><div class="d">调节战斗与提示音量</div></div><div class="sw"><input id="sfx" type="range" min="0" max="100" value="85"><div class="pv" id="sfxV">85%</div></div></div></div><button class="done">完成</button></div></div><script>function bind(id,vid){const el=document.getElementById(id),v=document.getElementById(vid);function paint(){const n=+el.value;el.style.setProperty('--track','linear-gradient(90deg,#4A9ECC '+n+'%,rgba(74,158,204,.2) '+n+'%)');v.textContent=n+'%'}el.addEventListener('input',paint);paint()}bind('bgm','bgmV');bind('sfx','sfxV');</script></body></html>
