<!DOCTYPE html><html lang="zh-CN"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>极地生存法则·游戏主战斗HUD</title><style>*{box-sizing:border-box}html,body{margin:0;min-height:100%;background:#000;overflow:hidden;font-family:'PingFang SC','Microsoft YaHei',sans-serif}body{display:flex;justify-content:center;padding:18px 0}.screen{position:relative;width:1080px;height:1920px;overflow:hidden;background:#061525;color:#fff}.scene{position:absolute;top:120px;left:0;right:0;bottom:200px;background:linear-gradient(180deg,#0D2A20 0%,#0A1F30 40%,#061525 100%);background-image:linear-gradient(rgba(74,158,204,.04) 1px,transparent 1px),linear-gradient(90deg,rgba(74,158,204,.04) 1px,transparent 1px);background-size:80px 80px}.top{position:absolute;top:0;left:0;width:1080px;height:120px;background:linear-gradient(180deg,rgba(6,16,32,.97),rgba(13,31,51,.9));border-bottom:1px solid rgba(74,158,204,.3);display:flex;padding:0 10px}.r{width:180px;height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;position:relative}.r:not(:last-child):after{content:'';position:absolute;right:0;top:18px;bottom:18px;width:1px;background:rgba(74,158,204,.2)}.i{font-size:44px}.v{font-size:34px;font-weight:900}.l{font-size:20px}.temp .v{color:#EF4444;animation:warn 1s infinite}.gate{margin-top:8px;text-align:center}.gt{width:120px;height:10px;background:rgba(255,255,255,.12);border-radius:5px;overflow:hidden}.gf{width:85%;height:100%;background:#22C55E}.board{position:absolute;right:0;top:140px;width:230px;height:460px;background:rgba(6,16,32,.88);border-left:2px solid #4A9ECC;border-radius:16px 0 0 16px;overflow:hidden}.board h3{margin:0;padding:14px 16px;font-size:26px;color:#7EC8E3;border-bottom:1px solid rgba(74,158,204,.25)}.list{padding:8px 10px}.item{height:80px;display:grid;grid-template-columns:34px 1fr auto;align-items:center;gap:8px;padding:0 12px;border-radius:12px;margin-bottom:6px;background:rgba(13,31,51,.5);transition:.25s}.item.flash{transform:translateX(-4px);box-shadow:0 0 18px rgba(74,158,204,.18)}.top1{background:linear-gradient(90deg,rgba(245,158,11,.25),transparent)}.top2{background:linear-gradient(90deg,rgba(148,163,184,.2),transparent)}.top3{background:linear-gradient(90deg,rgba(217,119,6,.18),transparent)}.board small{position:absolute;bottom:10px;left:16px;font-size:20px;opacity:.4;color:#93C5FD}.worker{position:absolute;width:52px;height:94px;opacity:.7;animation:float 2s infinite alternate ease-in-out}.worker:before{content:'';position:absolute;left:6px;top:0;width:40px;height:40px;border-radius:50%;border:3px solid #7EC8E3}.worker:after{content:'';position:absolute;left:16px;top:40px;width:20px;height:56px;border:3px solid #7EC8E3;border-top:none;border-radius:0 0 12px 12px}.w1{left:170px;top:260px}.w2{left:360px;top:470px;animation-delay:.3s}.w3{left:540px;top:860px;animation-delay:.8s}.w4{left:250px;top:1080px;animation-delay:1.1s}.door{position:absolute;left:640px;top:620px;width:80px;height:100px;border:3px solid #94A3B8;border-bottom:none;border-radius:50px 50px 0 0;opacity:.5}.bottom{position:absolute;left:0;bottom:0;width:1080px;height:200px;background:linear-gradient(0deg,rgba(6,16,32,.97),rgba(13,31,51,.85));border-top:1px solid rgba(74,158,204,.25);display:flex;align-items:center;justify-content:center}.gift{width:860px;height:130px;border-radius:14px;background:rgba(19,40,64,.9);border:1.5px solid #4A9ECC;display:flex;align-items:center;padding:0 28px;gap:20px}.icon{width:60px;height:60px;border-radius:50%;background:#22C55E;display:flex;align-items:center;justify-content:center;font-size:30px}.txt{font-size:30px}.txt .u{font-weight:800}.txt .g{color:#7EC8E3}.txt .e{color:#22C55E;font-weight:800}@keyframes warn{50%{opacity:.45}}@keyframes float{to{transform:translateY(-8px)}}</style></head><body><div class="screen"><div class="scene"></div><div class="top"><div class="r"><div class="i">🍖</div><div class="v" style="color:#F5A623">1,250</div><div class="l">食物</div></div><div class="r"><div class="i">⛏</div><div class="v" style="color:#9CA3AF">340</div><div class="l">煤炭</div></div><div class="r"><div class="i">💎</div><div class="v" style="color:#94A3B8">180</div><div class="l">矿石</div></div><div class="r temp"><div class="i">🌡</div><div class="v">-12°C</div><div class="l">温度</div></div><div class="r"><div class="i">⏱</div><div class="v" style="font-size:40px">08:42</div><div class="l">剩余时间</div></div><div class="r"><div class="l">城门</div><div class="gate"><div style="font-size:20px;color:#93C5FD;margin-bottom:8px">850/1000</div><div class="gt"><div class="gf"></div></div></div></div></div><aside class="board"><h3>⚔ 贡献榜</h3><div class="list" id="board"></div><small>3s刷新</small></aside><div class="worker w1"></div><div class="worker w2"></div><div class="worker w3"></div><div class="worker w4"></div><div class="door"></div><div class="bottom"><div class="gift"><div class="icon">🎁</div><div class="txt">⚡ <span class="u">极地猎人</span> 送出 <span class="g">能力药丸 ×1</span> → <span class="e">召唤守卫！+50食物</span></div></div></div></div><script>const data=[[['👑','凛冬战士','8,888','top1'],['🥈','极地猎人','6,200','top2'],['🥉','雪原守卫','4,100','top3'],['4','行路者A','2,800',''],['5','行路者B','1,500','']],[['👑','凛冬战士','8,930','top1'],['🥈','极地猎人','6,260','top2'],['🥉','雪原守卫','4,220','top3'],['4','北地旅者','2,980',''],['5','行路者A','2,830','']],[['👑','凛冬战士','9,100','top1'],['🥈','极地猎人','6,420','top2'],['🥉','雪原守卫','4,310','top3'],['4','北地旅者','3,020',''],['5','冰霜使徒','2,120','']]];const box=document.getElementById('board');let idx=0;function draw(){box.innerHTML='';data[idx].forEach(r=>{const d=document.createElement('div');d.className='item flash '+r[3];d.innerHTML='<div>'+r[0]+'</div><div>'+r[1]+'</div><div>'+r[2]+'</div>';box.appendChild(d)});setTimeout(()=>document.querySelectorAll('.item').forEach(n=>n.classList.remove('flash')),700)}draw();setInterval(()=>{idx=(idx+1)%data.length;draw()},3000);</script></body></html>
