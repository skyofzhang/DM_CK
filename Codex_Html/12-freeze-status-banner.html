<!DOCTYPE html><html lang="zh-CN"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>极地生存法则·冻结状态横幅</title><style>*{box-sizing:border-box}html,body{margin:0;min-height:100%;background:#000;overflow:hidden;font-family:'PingFang SC','Microsoft YaHei',sans-serif}body{display:flex;justify-content:center;padding:18px 0}.screen{position:relative;width:1080px;height:1920px;overflow:hidden;background:linear-gradient(180deg,#0D2A20 0%,#0A1F30 40%,#061525 100%);background-image:linear-gradient(rgba(74,158,204,.04) 1px,transparent 1px),linear-gradient(90deg,rgba(74,158,204,.04) 1px,transparent 1px);background-size:80px 80px;color:#fff}.e{position:absolute}.top{top:0;left:0;width:100%;height:120px;background:linear-gradient(180deg,rgba(74,158,204,.35),transparent)}.bottom{bottom:0;left:0;width:100%;height:120px;background:linear-gradient(0deg,rgba(74,158,204,.35),transparent)}.left{top:0;left:0;width:120px;height:100%;background:linear-gradient(90deg,rgba(74,158,204,.28),transparent)}.right{top:0;right:0;width:120px;height:100%;background:linear-gradient(270deg,rgba(74,158,204,.28),transparent)}.mask{position:absolute;inset:0;background:rgba(100,200,255,.06)}.ps{position:absolute;inset:0}.f{position:absolute;border-radius:50%;background:#A8D8F0}.banner{position:absolute;top:48%;left:0;width:1080px;height:100px;background:linear-gradient(90deg,rgba(30,80,130,.97),rgba(40,100,160,.95),rgba(30,80,130,.97));border-top:2px solid rgba(164,228,255,.6);border-bottom:2px solid rgba(164,228,255,.6);display:flex;align-items:center;justify-content:center;gap:24px}.banner:before,.banner:after{content:'';position:absolute;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent,#A8D8F0,transparent)}.banner:before{top:-6px}.banner:after{bottom:-6px}.snow{font-size:48px;color:#E8F4FF;filter:drop-shadow(0 0 12px #7EC8E3);animation:swing 1s infinite alternate ease-in-out}.main{font-size:40px;font-weight:900}.warn{color:#EF4444}.sub{font-size:36px;color:#FCA5A5;font-weight:700}.tag{font-size:26px;color:#93C5FD;opacity:.8;margin-left:30px}@keyframes swing{to{transform:rotate(15deg)}}@keyframes side{to{transform:translateX(var(--dx)) translateY(var(--dy));opacity:.15}}</style></head><body><div class="screen"><div class="e top"></div><div class="e bottom"></div><div class="e left"></div><div class="e right"></div><div class="mask"></div><div class="ps" id="ps"></div><div class="banner"><div class="snow">❄</div><div class="main"><span class="warn">⚠ 暴风雪来袭！</span> <span class="sub">工作效率 -50%</span></div><div class="snow">❄</div><div class="tag">持续 <span id="t">30</span>s</div></div></div><script>const box=document.getElementById('ps');for(let i=0;i<20;i++){const f=document.createElement('span'),s=2+Math.random()*3;f.className='f';f.style.setProperty('--dx',(200+Math.random()*260)+'px');f.style.setProperty('--dy',(Math.random()*40-20)+'px');Object.assign(f.style,{width:s+'px',height:s+'px',left:Math.random()*1080+'px',top:Math.random()*1920+'px',opacity:.35+Math.random()*.45,animation:'side '+(10+Math.random()*10)+'s linear infinite',animationDelay:(Math.random()*-10)+'s'});box.appendChild(f)}let n=30,el=document.getElementById('t');setInterval(()=>{n=n>0?n-1:30;el.textContent=n},1000);</script></body></html>
