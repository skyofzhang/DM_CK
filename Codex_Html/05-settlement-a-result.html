<!DOCTYPE html><html lang="zh-CN"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>极地生存法则·结算A屏</title><style>*{box-sizing:border-box}html,body{margin:0;min-height:100%;background:#000;overflow:hidden;font-family:'PingFang SC','Microsoft YaHei',sans-serif}body{display:flex;justify-content:center;padding:18px 0}.screen{position:relative;width:1080px;height:1920px;overflow:hidden;background:rgba(2,8,20,.92);color:#fff}.screen:before,.screen:after{content:'';position:absolute;left:0;right:0;height:320px}.screen:before{top:-40px;background:radial-gradient(circle at 50% 20%, rgba(13,58,92,.5), transparent 60%)}.screen:after{bottom:-40px;background:radial-gradient(circle at 50% 80%, rgba(13,58,92,.35), transparent 60%)}.ps{position:absolute;inset:0}.p{position:absolute;border-radius:50%}.sw{position:absolute;top:120px;left:50%;transform:translateX(-50%);width:420px;display:flex;justify-content:space-between;font-size:80px;color:#F59E0B;opacity:.8}.hero{position:absolute;top:280px;left:50%;transform:translateX(-50%);width:860px;text-align:center}.hero h1{margin:0;font-size:120px;font-weight:900;color:transparent;background:linear-gradient(180deg,#FFD700,#F59E0B,#D97706);-webkit-background-clip:text;background-clip:text;filter:drop-shadow(0 0 40px rgba(245,158,11,.8));animation:pop .6s ease-out both}.en{margin-top:20px;font-size:42px;color:#7EC8E3;letter-spacing:10px;opacity:.8}.sub{margin-top:60px;font-size:28px;color:#93C5FD}.day{margin-top:12px;font-size:88px;font-weight:900}.stats{position:absolute;top:800px;left:100px;right:100px;height:340px;border-radius:24px;background:rgba(13,31,51,.85);border:1.5px solid rgba(74,158,204,.4);display:flex}.col{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center}.col:not(:last-child){border-right:1px solid rgba(74,158,204,.25)}.ci{font-size:60px}.cv{margin-top:18px;font-size:56px;font-weight:900}.cl{margin-top:10px;font-size:26px;color:#93C5FD}.join{position:absolute;top:1180px;left:0;right:0;text-align:center;font-size:34px;color:#93C5FD}.btns{position:absolute;left:50%;bottom:160px;transform:translateX(-50%);display:flex;flex-direction:column;gap:24px;align-items:center}.main{width:560px;height:110px;border:2px solid #4A9ECC;border-radius:20px;background:linear-gradient(135deg,#1a4a7a,#2563a8);color:#fff;font-size:46px;font-weight:900;text-shadow:0 0 20px #4A9ECC}.subb{width:560px;height:80px;border-radius:18px;background:rgba(13,31,51,.65);border:1.5px solid #4A9ECC;color:#7EC8E3;font-size:36px}.pager{position:absolute;left:50%;bottom:80px;transform:translateX(-50%);font-size:28px;color:#4A9ECC;letter-spacing:14px}@keyframes pop{from{transform:scale(.5);opacity:0}to{transform:scale(1);opacity:1}}@keyframes rise{from{transform:translateY(0) scale(1);opacity:.8}to{transform:translateY(-2100px) scale(.4);opacity:0}}</style></head><body><div class="screen"><div class="ps" id="ps"></div><div class="sw"><span>⚔</span><span>⚔</span></div><section class="hero"><h1>度过凛冬！</h1><div class="en">WINTER SURVIVED</div><div class="sub">存活天数</div><div class="day">第 7 天</div></section><section class="stats"><div class="col"><div class="ci">🍖</div><div class="cv" style="color:#F5A623">3,420</div><div class="cl">总食物收集</div></div><div class="col"><div class="ci">🏰</div><div class="cv" style="font-size:46px;color:#22C55E">720/1000</div><div class="cl">城门最终HP</div></div><div class="col"><div class="ci">👥</div><div class="cv">128</div><div class="cl">参与勇士</div></div></section><div class="join">共 128 位勇士守护了要塞</div><div class="btns"><button class="main">查看详情 →</button><button class="subb">返回大厅</button></div><div class="pager">● ○ ○</div></div><script>const box=document.getElementById('ps');for(let i=0;i<60;i++){const p=document.createElement('span'),s=4+Math.random()*7,c=Math.random()>.45?'#F59E0B':'#F8FAFC';p.className='p';Object.assign(p.style,{width:s+'px',height:s+'px',left:Math.random()*1080+'px',bottom:(-50-Math.random()*700)+'px',background:c,opacity:.2+Math.random()*.6,boxShadow:'0 0 18px '+c,animation:'rise '+(8+Math.random()*8)+'s linear infinite',animationDelay:(Math.random()*-12)+'s'});box.appendChild(p)}</script></body></html>
