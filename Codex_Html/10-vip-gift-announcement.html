<!DOCTYPE html><html lang="zh-CN"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>极地生存法则·VIP大额礼物公告</title><style>*{box-sizing:border-box}html,body{margin:0;min-height:100%;background:#000;overflow:hidden;font-family:'PingFang SC','Microsoft YaHei',sans-serif}body{display:flex;justify-content:center;padding:18px 0}.screen{position:relative;width:1080px;height:1920px;overflow:hidden;background:#010508;color:#fff}.burst,.g,.b{position:absolute;inset:0}.burst:before,.burst:after{content:'';position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);width:180px;height:180px;border-radius:50%;background:radial-gradient(circle,rgba(245,158,11,.28),rgba(245,158,11,0) 70%);animation:ring 3s infinite}.burst:after{animation-delay:1.5s}.p{position:absolute;border-radius:50%}.center{position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);width:920px;height:1100px;display:flex;flex-direction:column;align-items:center;text-align:center}.crown{font-size:180px;filter:drop-shadow(0 0 60px rgba(245,158,11,.9));animation:float 2s ease-in-out infinite;margin-top:40px}.user{margin-top:10px;line-height:1.7}.tag{font-size:34px;color:#F59E0B;opacity:.9}.name{font-size:48px;font-weight:900}.gift{position:relative;margin-top:60px;font-size:120px;font-weight:900;color:transparent;background:linear-gradient(180deg,#FFD700 0%,#F59E0B 40%,#D97706 100%);-webkit-background-clip:text;background-clip:text;filter:drop-shadow(0 0 50px rgba(245,158,11,1))}.glow{position:absolute;top:100%;left:50%;transform:translateX(-50%);width:400px;height:80px;background:#F59E0B;opacity:.3;filter:blur(40px)}.line{width:600px;height:2px;margin:50px auto;background:linear-gradient(90deg,transparent,#F59E0B,transparent)}.effects{display:flex;flex-wrap:wrap;gap:24px;justify-content:center}.pill{padding:16px 36px;border-radius:50px;border:2px solid;font-size:32px}.thanks{margin-top:80px;font-size:36px;color:#FCD34D;opacity:.9}.plus{margin-top:16px;font-size:28px;color:#93C5FD}.count{position:absolute;left:50%;bottom:100px;transform:translateX(-50%);font-size:26px;color:#7EC8E3;opacity:.5}@keyframes ring{0%{width:120px;height:120px;opacity:0}40%{opacity:.3}100%{width:1600px;height:1600px;opacity:0}}@keyframes float{50%{transform:translateY(-15px)}}@keyframes goldFly{to{transform:translate(var(--dx),var(--dy)) scale(.2);opacity:0}}@keyframes blueRise{to{transform:translateY(-2300px);opacity:0}}</style></head><body><div class="screen"><div class="burst"></div><div class="g" id="g"></div><div class="b" id="b"></div><div class="center"><div class="crown">👑</div><div class="user"><span class="tag">至尊贵族</span> <span class="name">×××</span> <span class="tag">送出了传说礼物</span></div><div class="gift">神秘空投<div class="glow"></div></div><div class="line"></div><div class="effects"><div class="pill" style="background:rgba(245,166,35,.15);border-color:#F5A623;color:#F5A623">+500 🍖食物</div><div class="pill" style="background:rgba(156,163,175,.15);border-color:#9CA3AF;color:#9CA3AF">+200 ⛏煤炭</div><div class="pill" style="background:rgba(148,163,184,.15);border-color:#94A3B8;color:#94A3B8">+100 💎矿石</div><div class="pill" style="background:rgba(34,197,94,.15);border-color:#22C55E;color:#22C55E">+300 🏰城门HP</div></div><div class="thanks">感谢至尊贵族的慷慨赞助！</div><div class="plus">英雄榜贡献值 +5,000</div></div><div class="count">公告将在 <span id="c">5</span> 秒后消失</div></div><script>const g=document.getElementById('g'),b=document.getElementById('b');for(let i=0;i<50;i++){const p=document.createElement('span'),s=3+Math.random()*6,c=Math.random()>.5?'#F59E0B':'#FCD34D';p.className='p';p.style.setProperty('--dx',(Math.random()*1600-800)+'px');p.style.setProperty('--dy',(Math.random()*1200-600)+'px');Object.assign(p.style,{width:s+'px',height:s+'px',left:'540px',top:'960px',background:c,opacity:.35+Math.random()*.4,boxShadow:'0 0 12px '+c,animation:'goldFly '+(2.4+Math.random()*2.5)+'s ease-out infinite',animationDelay:(Math.random()*-3)+'s'});g.appendChild(p)}for(let i=0;i<30;i++){const p=document.createElement('span'),s=2+Math.random()*5;p.className='p';Object.assign(p.style,{width:s+'px',height:s+'px',left:Math.random()*1080+'px',top:(1920+Math.random()*300)+'px',background:'#7EC8E3',opacity:.25+Math.random()*.35,animation:'blueRise '+(8+Math.random()*6)+'s linear infinite',animationDelay:(Math.random()*-10)+'s'});b.appendChild(p)}let n=5,el=document.getElementById('c');setInterval(()=>{n=n>0?n-1:5;el.textContent=n},1000);</script></body></html>
