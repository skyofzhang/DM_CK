<!DOCTYPE html><html lang="zh-CN"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>极地生存法则·GM调试控制栏</title><style>*{box-sizing:border-box}html,body{margin:0;min-height:100%;background:#000;overflow:hidden;font-family:'PingFang SC','Microsoft YaHei',sans-serif}body{display:flex;justify-content:center;padding:18px 0}.screen{position:relative;width:1080px;height:1920px;overflow:hidden;background:linear-gradient(180deg,#0D2A20 0%,#0A1F30 40%,#061525 100%);background-image:linear-gradient(rgba(74,158,204,.04) 1px,transparent 1px),linear-gradient(90deg,rgba(74,158,204,.04) 1px,transparent 1px);background-size:80px 80px}.panel{position:absolute;bottom:0;left:0;width:1080px;height:280px;background:rgba(2,6,14,.97);border-top:2px solid rgba(255,140,0,.6);padding:20px 30px}.top{display:flex;align-items:center;gap:16px;margin-bottom:16px}.dev{font-size:26px;color:#FB923C;font-weight:700;font-family:monospace}.live{width:8px;height:8px;border-radius:50%;background:#22C55E;animation:blink 1s infinite}.server{font-size:22px;color:#4ADE80}.state{margin-left:auto;background:rgba(34,197,94,.15);border:1px solid #22C55E;border-radius:6px;padding:4px 14px;font-size:22px;color:#22C55E}.row{display:flex;gap:16px;flex-wrap:wrap}.r2{margin-top:14px}.btn{height:60px;border-radius:10px;font-size:26px;font-weight:700;cursor:pointer;border:none;transition:.15s;font-family:'PingFang SC','Microsoft YaHei',sans-serif}.btn:hover{filter:brightness(1.12);transform:translateY(-1px)}.status{display:flex;gap:24px;margin-top:14px;font-size:22px;font-family:monospace;color:#93C5FD}@keyframes blink{50%{opacity:.25}}</style></head><body><div class="screen"><div class="panel"><div class="top"><div class="dev">[DEV] 调试面板</div><div class="live"></div><div class="server">服务器已连接</div><div class="state">状态：running</div></div><div class="row"><button class="btn" style="width:200px;background:#166534;color:#4ADE80" data-a="start">▶ 开始游戏</button><button class="btn" style="width:200px;background:#713F12;color:#FCD34D" data-a="pause">⏸ 暂停游戏</button><button class="btn" style="width:200px;background:#7F1D1D;color:#FCA5A5" data-a="end">⏹ 结束游戏</button><button class="btn" style="width:160px;background:#1E3A5F;color:#7EC8E3" data-a="reset">🔄 重置</button></div><div class="row r2"><button class="btn" style="width:220px;background:#1E3A5F;color:#93C5FD" data-a="gift-t1">🎁 模拟T1礼物</button><button class="btn" style="width:220px;background:#1E3A5F;color:#FCD34D" data-a="gift-t3">🎁 模拟T3礼物</button><button class="btn" style="width:220px;background:#451A03;color:#F59E0B" data-a="gift-t5">🎁 模拟T5礼物</button><button class="btn" style="width:200px;background:#1E3A5F;color:#7EC8E3" data-a="freeze">❄ 触发冻结</button><button class="btn" style="width:200px;background:#450A0A;color:#FCA5A5" data-a="monster">💥 召唤怪物</button></div><div class="status"><span>橘子位置：0.00</span><span>当前推力：0</span><span>在线人数：128</span><span>服务器延迟：23ms</span></div></div></div><script>document.querySelectorAll('.btn').forEach(b=>b.addEventListener('click',()=>console.log('[DEV ACTION]',b.dataset.a)));</script></body></html>
