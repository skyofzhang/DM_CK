<!DOCTYPE html><html lang="zh-CN"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>极地生存法则·玩家加入通知</title><style>*{box-sizing:border-box}html,body{margin:0;min-height:100%;background:#000;overflow:hidden;font-family:'PingFang SC','Microsoft YaHei',sans-serif}body{display:flex;justify-content:center;padding:18px 0}.screen{position:relative;width:1080px;height:1920px;overflow:hidden;background:linear-gradient(180deg,#0D2A20 0%,#0A1F30 40%,#061525 100%);background-image:linear-gradient(rgba(74,158,204,.04) 1px,transparent 1px),linear-gradient(90deg,rgba(74,158,204,.04) 1px,transparent 1px);background-size:80px 80px;color:#fff}.top{position:absolute;top:0;left:0;width:1080px;height:120px;background:linear-gradient(180deg,rgba(6,16,32,.97),rgba(13,31,51,.9));border-bottom:1px solid rgba(74,158,204,.3);display:flex;align-items:center;justify-content:space-around;color:#93C5FD;font-size:24px}.hint{position:absolute;left:0;right:0;top:48%;text-align:center;font-size:28px;color:#93C5FD;opacity:.35}.zone{position:absolute;bottom:0;left:0;width:1080px;height:260px;background:linear-gradient(0deg,rgba(6,16,32,.96),rgba(6,16,32,.6),transparent)}.cap{position:absolute;left:50%;transform:translateX(-50%);width:680px;height:72px;background:rgba(13,31,51,.92);border:1.5px solid rgba(74,158,204,.5);border-radius:36px;display:flex;align-items:center;padding:0 24px;gap:16px;transition:all .4s ease}.icon{font-size:32px}.msg{flex:1;font-size:28px}.msg .u{font-weight:800;color:#7EC8E3}.time{font-size:22px;color:#93C5FD;opacity:.5}</style></head><body><div class="screen"><div class="top"><div>🍖 食物</div><div>⛏ 煤炭</div><div>💎 矿石</div><div>🌡 温度</div><div>⏱ 时间</div></div><div class="hint">← 底部：玩家加入通知（自动弹出，3条后最旧消失）</div><div class="zone" id="z"></div></div><script>const names=['凛冬战士','极地猎人','雪原守卫','北境旅人','暮雪学徒','冰锋牧人'];const z=document.getElementById('z');let q=[{name:'凛冬战士',time:'刚刚'},{name:'极地猎人',time:'1s前'},{name:'雪原守卫',time:'3s前'}],idx=3;function draw(){z.querySelectorAll('.cap').forEach(n=>n.remove());q.slice(0,3).forEach((it,i)=>{const d=document.createElement('div');d.className='cap';d.style.bottom=[20,108,196][i]+'px';d.style.opacity=[1,.75,.45][i];d.innerHTML='<div class="icon">⛄</div><div class="msg"><span class="u">'+it.name+'</span> 加入了守城队伍</div><div class="time">'+it.time+'</div>';z.appendChild(d)})}draw();setInterval(()=>{q.unshift({name:names[idx%names.length],time:'刚刚'});q=q.map((v,i)=>({name:v.name,time:i===0?'刚刚':(i*2-1)+'s前'})).slice(0,3);idx++;draw()},3000);</script></body></html>
