<!DOCTYPE html><html lang="zh-CN"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>极地生存法则·公告弹窗变体</title><style>*{box-sizing:border-box}html,body{margin:0;min-height:100%;background:#000;overflow:hidden;font-family:'PingFang SC','Microsoft YaHei',sans-serif}body{display:flex;justify-content:center;padding:18px 0}.screen{position:relative;width:1080px;height:1920px;overflow:hidden;background:#020811;color:#fff}.divider{position:absolute;left:0;width:1080px;height:30px;background:#05101c}.label{position:absolute;left:16px;writing-mode:vertical-rl;font-size:18px;color:#93C5FD;opacity:.5;letter-spacing:4px}.v{position:absolute;left:0;width:1080px;height:640px;padding:20px 40px;background:rgba(2,8,20,.88);overflow:hidden}.inner{position:absolute;left:50%;top:50%;transform:translate(-50%,-50%) scale(.55);display:flex;flex-direction:column;align-items:center;text-align:center;width:1200px}.line{width:520px;height:2px;background:linear-gradient(90deg,transparent,#7EC8E3,transparent)}.small{margin-top:18px;font-size:34px;letter-spacing:8px}.t1{top:0;background:radial-gradient(circle at 50% 8%,rgba(74,158,204,.22),transparent 35%),rgba(2,8,20,.88)}.t1 h2{margin:26px 0 0;font-size:100px;font-weight:900;color:transparent;background:linear-gradient(180deg,#fff,#7EC8E3);-webkit-background-clip:text;background-clip:text;filter:drop-shadow(0 0 30px rgba(74,158,204,.8))}.t2{top:680px;background:radial-gradient(circle at 0 0,rgba(239,68,68,.18),transparent 35%),radial-gradient(circle at 100% 100%,rgba(239,68,68,.18),transparent 35%),rgba(40,10,10,.95)}.t2 h2{margin:20px 0 0;font-size:100px;font-weight:900;color:transparent;background:linear-gradient(180deg,#FCA5A5,#EF4444);-webkit-background-clip:text;background-clip:text}.warn{font-size:80px;color:#EF4444;animation:bob 1s infinite alternate ease-in-out}.t3{top:1360px;background:radial-gradient(circle at 50% 0,rgba(245,158,11,.22),transparent 35%),rgba(2,8,20,.92)}.t3 h2{margin:20px 0 0;font-size:100px;font-weight:900;color:transparent;background:linear-gradient(180deg,#FFD700,#F59E0B);-webkit-background-clip:text;background-clip:text;filter:drop-shadow(0 0 28px rgba(245,158,11,.7))}.snow,.gold{position:absolute;inset:0}.dot{position:absolute;border-radius:50%}@keyframes bob{to{transform:translateY(-10px)}}@keyframes fall{to{transform:translate(var(--dx),700px)}}@keyframes rise{to{transform:translateY(-240px);opacity:0}}</style></head><body><div class="screen"><section class="v t1"><div class="label" style="top:120px">游戏开始</div><div class="snow" id="snow"></div><div class="inner"><div class="line"></div><div style="font-size:42px;margin:12px 0">❄ ❄</div><h2>凛冬开始！</h2><div class="small" style="color:#7EC8E3">WINTER HAS BEGUN</div><div class="line" style="margin-top:22px"></div></div></section><div class="divider" style="top:640px"></div><section class="v t2"><div class="label" style="top:800px">怪物来袭</div><div class="inner"><div class="warn">⚠</div><h2>怪物来袭！</h2><div class="small" style="color:#EF4444">MONSTERS INCOMING</div><div style="margin-top:18px;font-size:28px;color:#F87171">第 3 波 · 加速建造！</div></div></section><div class="divider" style="top:1320px"></div><section class="v t3"><div class="label" style="top:1480px">胜利公告</div><div class="gold" id="gold"></div><div class="inner"><h2>🎉 度过凛冬！</h2><div class="small" style="color:#F59E0B">WINTER SURVIVED</div><div style="margin-top:18px;font-size:28px;color:#FCD34D">第 7 天 · 全员存活！</div></div></section></div><script>const snow=document.getElementById('snow');for(let i=0;i<15;i++){const d=document.createElement('span'),s=2+Math.random()*4;d.className='dot';d.style.setProperty('--dx',(Math.random()*60-30)+'px');Object.assign(d.style,{width:s+'px',height:s+'px',left:Math.random()*1080+'px',top:Math.random()*640+'px',background:'#fff',opacity:.3+Math.random()*.5,animation:'fall '+(6+Math.random()*6)+'s linear infinite',animationDelay:(Math.random()*-10)+'s'});snow.appendChild(d)}const gold=document.getElementById('gold');for(let i=0;i<10;i++){const d=document.createElement('span'),s=4+Math.random()*5;d.className='dot';Object.assign(d.style,{width:s+'px',height:s+'px',left:Math.random()*1080+'px',top:500+Math.random()*120+'px',background:'#F59E0B',opacity:.3+Math.random()*.4,boxShadow:'0 0 12px rgba(245,158,11,.6)',animation:'rise '+(6+Math.random()*5)+'s ease-out infinite',animationDelay:(Math.random()*-8)+'s'});gold.appendChild(d)}</script></body></html>
