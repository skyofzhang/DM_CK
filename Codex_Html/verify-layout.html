const S=0.25, CW=1080, CH=1920;

function css(aMin,aMax,piv,pos,sz){
  const aL=aMin.x*CW,aR=aMax.x*CW,aB=aMin.y*CH,aT=aMax.y*CH;
  const aCX=(aL+aR)/2,aCY=(aB+aT)/2;
  const w=(aR-aL)+sz.w,h=(aT-aB)+sz.h;
  const pOX=(piv.x-.5)*w,pOY=(piv.y-.5)*h;
  const cX=aCX+pos.x-pOX,cY=aCY+pos.y-pOY;
  return{left:(cX-w/2)*S,top:(CH-cY-h/2)*S,width:Math.max(w*S,2),height:Math.max(h*S,2)};
}

const bs =(py,h)     =>css({x:0,y:0},{x:1,y:0},{x:.5,y:0},{x:0,y:py},{w:0,h});
const ms =(py,h)     =>css({x:0,y:.5},{x:1,y:.5},{x:.5,y:.5},{x:0,y:py},{w:0,h});

const grid=document.getElementById('grid');
let totalOk=0, totalFix=0, totalMiss=0, totalXtra=0;

const TAG_BADGES={
  ok:     '<span class="badge bok">✅ 已验证</span>',
  fix:    '<span class="badge bfix">🔧 已修复</span>',
  warn:   '<span class="badge bwarn">⚠️ 存在差异</span>',
  catalog:'<span class="badge bcat">📚 设计参考</span>',
  partial:'<span class="badge bpar">🔍 部分覆盖</span>',
};

PANELS.forEach(p=>{
  const card=document.createElement('div');
  card.className='card';
  const badges=p.tags.map(t=>TAG_BADGES[t]||'').join('');
  const noteHtml=p.note?`<div class="card-note">${p.note.replace(/\n/g,'<br>')}</div>`:'';

  card.innerHTML=`
    <div class="card-id">HTML ${p.id}</div>
    <div class="card-name">${p.name}</div>
    <div class="card-ref" title="${p.ref}">${p.ref}</div>
    <div class="cvwrap" id="cv-${p.id}"></div>
    <div class="badge-row">${badges}</div>
    ${noteHtml}`;
  grid.appendChild(card);

  const cv=card.querySelector('.cvwrap');
  p.elems.forEach(el=>{
    const r=el.r;
    if(r.left+r.width<0||r.left>270||r.top+r.height<0||r.top>480) return;
    const div=document.createElement('div');
    div.className=`elem ${el.t}`;
    div.style.cssText=`left:${r.left.toFixed(1)}px;top:${r.top.toFixed(1)}px;`+
      `width:${r.width.toFixed(1)}px;height:${r.height.toFixed(1)}px;`;
    const lbl=document.createElement('div');
    lbl.className='lbl';
    lbl.textContent=el.n;
    div.appendChild(lbl);
    cv.appendChild(div);
    if(el.t==='fix')       totalFix++;
    else if(el.t==='miss') totalMiss++;
    else if(el.t==='xtra') totalXtra++;
    else                   totalOk++;
  });
});

document.getElementById('stats').textContent=
